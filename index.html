<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>BoredAF V1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --dark: #0f0f1a;
            --darker: #050510;
            --card-bg: #12121a;
            --card-hover: #1a1a2e;
            --border: #2a2a40;
            --text: #e6f7ff;
            --text-muted: #8899a6;
            --accent-pink: #ff6b9d;
            --accent-purple: #c77dff;
            --accent-orange: #ff9e00;
            --accent-blue: #4dabf7;
            --accent-yellow: #ffd43b;
            --accent-red: #ff6b6b;
            --accent-green: #00ff88;
            --gradient-1: linear-gradient(135deg, #00d4ff, #9d4edd);
            --gradient-2: linear-gradient(135deg, #ff6b9d, #c77dff);
            --glow-blue: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .nav-container {
            width: 80px;
            background: var(--dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-logo {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: var(--glow-blue);
            background: var(--darker);
        }

        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .nav-logo:hover { 
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }

        .nav-list {
            list-style: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 12px;
        }

        .nav-item {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--card-bg);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -12px;
            width: 3px;
            height: 24px;
            background: var(--gradient-1);
            border-radius: 2px;
        }

        .nav-item i {
            font-size: 22px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .nav-item.active i, .nav-item:hover i {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .nav-tooltip {
            position: absolute;
            left: 70px;
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            font-size: 12px;
            z-index: 200;
            border: 1px solid var(--border);
            transform: translateX(-10px);
        }

        .nav-item:hover .nav-tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        .side-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 12px;
        }

        .side-action-btn {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .side-action-btn:hover {
            background: var(--card-bg);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
            transform: rotate(180deg);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 70px;
            background: rgba(15, 15, 26, 0.8);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            backdrop-filter: blur(20px);
            z-index: 50;
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--darker);
            border-radius: 12px;
            padding: 12px 20px;
            width: 420px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: var(--glow-blue);
        }

        .search-box i {
            color: var(--text-muted);
            margin-right: 12px;
            font-size: 18px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .top-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        .top-btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .top-btn.primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: var(--glow-blue);
        }

        .top-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .top-btn.secondary {
            background: var(--card-bg);
            color: white;
            border: 1px solid var(--border);
        }

        .top-btn.secondary:hover {
            background: var(--card-hover);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .content-area::-webkit-scrollbar {
            width: 8px;
        }

        .content-area::-webkit-scrollbar-track {
            background: var(--darker);
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .content-area::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .section-header {
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-header h2 i {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .version-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            animation: pulse-glow 2s ease-in-out infinite alternate;
            font-weight: 700;
            letter-spacing: 1px;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
            to { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 40px rgba(157, 78, 221, 0.2); }
        }

        .updates {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(157, 78, 221, 0.05));
            border-left: 3px solid var(--primary);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 16px 16px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-left-width: 3px;
        }

        .updates h3 {
            font-family: 'Orbitron', monospace;
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .update-item {
            color: var(--text-muted);
            margin: 0.6rem 0;
            font-size: 0.95rem;
            padding-left: 1.5rem;
            position: relative;
            transition: all 0.3s;
        }

        .update-item:hover {
            color: var(--text);
            transform: translateX(4px);
        }

        .update-item::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent-purple);
            font-weight: bold;
        }

        .update-item.feature {
            color: var(--accent-pink);
            font-weight: 600;
        }

        .update-item.feature::before {
            content: '★';
            color: var(--accent-pink);
        }

        .category {
            margin-bottom: 3rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .category-icon {
            width: 52px;
            height: 52px;
            background: var(--gradient-1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--glow-blue);
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .category h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .category-subtitle {
            color: var(--accent-pink);
            font-size: 0.9rem;
            margin-left: auto;
            font-style: italic;
            opacity: 0.9;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: block;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
        }

        .link-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--glow-blue);
        }

        .link-card:hover::before {
            opacity: 0.05;
        }

        .link-title {
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .link-title i { color: var(--primary); }

        .link-url {
            color: var(--accent-blue);
            font-size: 0.8rem;
            word-break: break-all;
            opacity: 0.9;
            font-family: 'Courier New', monospace;
            position: relative;
            z-index: 1;
            margin-top: 0.25rem;
        }

        .link-card:hover .link-url {
            color: var(--primary);
            opacity: 1;
        }

        .link-note {
            color: var(--accent-pink);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .subcategory {
            color: var(--accent-yellow);
            margin: 2rem 0 1rem 0;
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            border-left: 3px solid var(--accent-yellow);
            padding-left: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border);
            position: relative;
        }

        .content-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-pink);
            box-shadow: 0 20px 40px rgba(255, 107, 157, 0.2);
        }

        .card-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: var(--border);
            transition: transform 0.3s;
        }

        .content-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-badges {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-badge {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-badge.rating {
            background: linear-gradient(135deg, #ffd43b, #ff9e00);
            color: #000;
        }

        .card-badge.bogge {
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            color: white;
        }

        .card-info {
            padding: 16px;
            background: var(--card-bg);
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .modal-header {
            padding: 20px 30px;
            background: var(--dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .modal-title-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .modal-poster-thumb {
            width: 60px;
            height: 90px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .modal-poster-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-title-info h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .modal-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .modal-close {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
            transform: rotate(90deg);
        }

        .modal-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .player-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .player-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        .player-frame:fullscreen {
            width: 100vw;
            height: 100vh;
        }

        .player-controls {
            height: 60px;
            background: var(--dark);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .control-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .control-btn.active {
            background: var(--primary);
            color: var(--darker);
            border-color: var(--primary);
        }

        .player-status {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .source-sidebar {
            width: 300px;
            background: var(--darker);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .source-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .source-header h3 {
            font-family: 'Orbitron', monospace;
            color: var(--primary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .source-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .source-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .source-item:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .source-item.active {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.05);
        }

        .source-item.active::before {
            transform: scaleY(1);
        }

        .source-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-name i { color: var(--primary); }

        .source-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .source-warning {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--accent-red);
        }

        .iframe-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary);
            font-size: 48px;
            animation: spin 1s linear infinite;
            z-index: 10;
            display: none;
        }

        .iframe-loader.active {
            display: block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-container {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
        }

        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 16px;
        }

        .error-container {
            grid-column: 1/-1;
            text-align: center;

    <!-- Loading Screen -->
    <div id="loadingScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--darker);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;">

        </div>
        <div id="loadingText" style="font-family:'Orbitron',monospace;font-size:1.5rem;color:var(--primary);letter-spacing:4px;text-transform:uppercase;animation:glow-text 1.5s ease-in-out infinite alternate;">Loading BoredAF</div>
        <div id="loadingBarContainer" style="width:200px;height:4px;background:var(--card-bg);border-radius:2px;margin-top:20px;overflow:hidden;border:1px solid var(--border);">
            <div id="loadingBar" style="width:0%;height:100%;background:var(--gradient-1);border-radius:2px;transition:width 0.3s ease;"></div>
        </div>

    <style>
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--primary)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--primary)); }
        }
        @keyframes glow-text {
            from { text-shadow: 0 0 10px var(--primary); opacity: 0.7; }
            to { text-shadow: 0 0 30px var(--primary), 0 0 60px var(--accent-purple); opacity: 1; }
        }
        /* Doodle theme loading screen */
        .doodle-loading {
            background: #F5F0E8 !important;
            font-family: 'Short Stack', cursive !important;
        }
        .doodle-loading #loadingLogo img {
            filter: none !important;
            animation: doodle-bounce 1s ease-in-out infinite !important;
            border: 3px solid #3c3c3c !important;
            border-radius: 12px !important;
            padding: 8px !important;
            background: #FFFFFF !important;
        }
        @keyframes doodle-bounce {
            0%, 100% { transform: rotate(-3deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.05); }
        }
        .doodle-loading #loadingText {
            font-family: 'Short Stack', cursive !important;
            color: #3c3c3c !important;
            text-shadow: none !important;
            animation: doodle-wiggle 2s ease-in-out infinite !important;
            letter-spacing: 2px !important;
            text-transform: none !important;
        }
        @keyframes doodle-wiggle {
            0%, 100% { transform: rotate(-1deg); }
            25% { transform: rotate(1deg); }
            50% { transform: rotate(-1deg); }
            75% { transform: rotate(1deg); }
        }
        .doodle-loading #loadingBarContainer {
            background: #FFFFFF !important;

        function onPlayerStateChange(event) {

        function updatePlayButton() {
            const playBtn = document.querySelector('.music-control-btn.play i');
            if (playBtn) {
                playBtn.className = isPlaying ? 'ri-pause-fill' : 'ri-play-fill';
            }
        }

        function togglePlay() {
            if (!youtubePlayer || !youtubePlayer.playVideo) return;
            
            if (isPlaying) {
                youtubePlayer.pauseVideo();
                isPlaying = false;
            } else {
                youtubePlayer.playVideo();
                isPlaying = true;
            }
            updatePlayButton();
        }

        function playTrack(index) {
            if (!youtubePlayer || !youtubePlayer.loadVideoById) return;
            
            currentTrackIndex = index;
            const track = currentPlaylist[index];
            youtubePlayer.loadVideoById(track.id);
            isPlaying = true;
            updatePlayButton();
            updateMusicUI();
        }

        function playNextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
            playTrack(currentTrackIndex);
        }

        function playPrevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playTrack(currentTrackIndex);
        }

        function updateMusicUI() {
            // Update track list highlighting
            document.querySelectorAll('.music-track').forEach((track, index) => {
                track.classList.toggle('active', index === currentTrackIndex);

            // Update player info
            const currentTrack = currentPlaylist[currentTrackIndex];
            const titleEl = document.querySelector('.music-player-info h3');
            const artistEl = document.querySelector('.music-player-info p');
            if (titleEl && artistEl && currentTrack) {
                titleEl.textContent = currentTrack.title;
                artistEl.textContent = currentTrack.artist;
            }
        }

        var gameCoverMap = new Map();
var coversLoaded = false;

async function loadGameCovers() {
    if (coversLoaded) return;
    try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/art-in-imgs/coversv4.zip');
        if (!response.ok) throw new Error('Failed to fetch covers');
        const blob = await response.blob();
        const zip = await JSZip.loadAsync(blob);

        for (const fileName of Object.keys(zip.files)) {
            const file = zip.files[fileName];
            if (!file.dir) {
                const fileBlob = await file.async('blob');
                const blobUrl = URL.createObjectURL(fileBlob);
                // Store by filename without extension
                const baseName = fileName.split('/').pop().replace(/\.[^/.]+$/, '');
                gameCoverMap.set(baseName.toLowerCase(), blobUrl);
            }
        }
        coversLoaded = true;
    } catch (err) {
        console.error('Error loading game covers:', err);
    }
}

function getGameCoverUrl(gameName) {
    const cleanName = gameName.toLowerCase().replace(/[^a-z0-9]/g, '');
    for (const [key, url] of gameCoverMap) {
        const cleanKey = key.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (cleanName.includes(cleanKey) || cleanKey.includes(cleanName)) {
            return url;
        }
    }
    return null;
}

        async function performSearch(query) {
            isSearchResults = true;
            lastSearchQuery = query;
            
            if (currentSection !== 'movies' && currentSection !== 'tv') {
                currentSection = 'movies';
                currentType = 'movie';
            }

            var container = document.getElementById('contentArea');
            var typeLabel = currentType === 'movie' ? 'Movies' : 'TV Shows';
            var typeIcon = currentType === 'movie' ? 'ri-movie-2-line' : 'ri-tv-line';
            
            container.innerHTML = 
                '<div class="section-header">' +
                    '<h2><i class="' + typeIcon + '"></i> Search Results</h2>' +
                    '<div class="search-header">' +
                        '<p class="search-info">Searching for: <span>"' + escapeHtml(query) + '"</span></p>' +
                        '<button class="clear-search-btn" id="clearSearchBtn">' +
                            '<i class="ri-close-line"></i> Clear Search' +
                        '</button>' +
                    '</div>' +
                '</div>' +
                '<div class="cards-grid" id="itemsGrid">' +
                    '<div class="loading-container">' +
                        '<i class="ri-loader-4-line loading-spinner"></i>' +
                        '<p>Searching TMDB for ' + typeLabel.toLowerCase() + '...</p>' +
                    '</div>' +
                '</div>';

            document.getElementById('clearSearchBtn').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                showSection(currentType === 'movie' ? 'movies' : 'tv');
            });

            try {
                var endpoint = currentType === 'movie' ? '/search/movie' : '/search/tv';
                var response = await fetch(
                    CONFIG.TMDB_BASE_URL + endpoint + '?api_key=' + CONFIG.TMDB_API_KEY + '&query=' + encodeURIComponent(query) + '&page=1'
                );
                if (!response.ok) throw new Error('Search failed: ' + response.status);
                var data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    currentItems = data.results.map(function(item) {
                        var title = currentType === 'movie' ? item.title : item.name;
                        var date = currentType === 'movie' ? item.release_date : item.first_air_date;
                        return {
                            id: item.id,
                            title: title,
                            year: date ? date.split('-')[0] : 'N/A',
                            rating: item.vote_average ? item.vote_average.toFixed(1) : 'N/A',
                            image: item.poster_path ? CONFIG.TMDB_IMAGE_URL + '/w500' + item.poster_path : null,
                            backdrop: item.backdrop_path ? CONFIG.TMDB_IMAGE_URL + '/original' + item.backdrop_path : null,
                            overview: item.overview,
                            type: currentType
                        };
                    });
                    
                    displayItems();
                    
                    var header = container.querySelector('.section-header h2');
                    header.innerHTML = '<i class="' + typeIcon + '"></i> Search Results (' + currentItems.length + ' found)';
                } else {
                    document.getElementById('itemsGrid').innerHTML = 
                        '<div class="error-container">' +
                            '<i class="ri-search-line error-icon" style="color: var(--accent-yellow);"></i>' +
                            '<p style="color: var(--text); font-weight: 600; margin-bottom: 8px;">No ' + typeLabel.toLowerCase() + ' found</p>' +
                            '<p>No results for "' + escapeHtml(query) + '". Try a different search term.</p>' +
                        '</div>';
                }
            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('itemsGrid').innerHTML = 
                    '<div class="error-container">' +
                        '<i class="ri-error-warning-line error-icon"></i>' +
                        '<p style="color: var(--text); font-weight: 600; margin-bottom: 8px;">Search failed</p>' +
                        '<p>Could not search TMDB. Check your connection.</p>' +
                    '</div>';
            }
        }

            renderSourceList();

            if (currentItem.type === 'movie' || currentItem.type === 'tv') {
                try {
                    var response = await fetch(
                        CONFIG.TMDB_BASE_URL + '/' + currentItem.type + '/' + currentItem.id + '/external_ids?api_key=' + CONFIG.TMDB_API_KEY
                    );
                    var data = await response.json();
                    currentItem.imdb_id = data.imdb_id;
                    loadSource(0);
                } catch (e) {
                    loadSource(0);
                }
            } else {
                loadSource(0);

        function loadSource(index) {
            currentSourceIndex = index;
            var source = CONFIG.embedSources[index];

            var loader = document.getElementById('iframeLoader');
            
            renderSourceList();
            
            loader.classList.add('active');

            if (source.name === 'VidSrc Embed' && currentItem.imdb_id) {

                url = source.url + type + '/' + currentItem.id;

            iframe.src = url;
            
            setTimeout(function() {
                loader.classList.remove('active');
            }, 2000);
        }

        // Download current page as HTML
        function downloadCurrentPage() {
            // Get the current HTML content
            var htmlContent = document.documentElement.outerHTML;
            
            // Create a clean version by removing the download modal and button
            var parser = new DOMParser();
            var doc = parser.parseFromString(htmlContent, 'text/html');
            
            // Remove download-related elements for the exported version
            var downloadBtn = doc.getElementById('downloadBtn');
            if (downloadBtn) downloadBtn.remove();
            
            var downloadModal = doc.getElementById('downloadModal');
            if (downloadModal) downloadModal.remove();
            
            // Remove secret modal
            var secretModal = doc.getElementById('secretModal');
            if (secretModal) secretModal.remove();
            
            // Update the HTML content
            var cleanHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
            
            // Create blob and download
            var blob = new Blob([cleanHtml], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'BoredAF_V7.2.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Show success feedback on autoDownloadBtn (downloadHtmlBtn doesn't exist in HTML)
            var btn = document.getElementById('autoDownloadBtn');
            if (btn) {
                var original = btn.innerHTML;
                btn.innerHTML = '<div class="download-icon" style="background: var(--accent-green);"><i class="ri-check-line"></i></div><div class="download-info"><h3>Downloaded!</h3><p>File saved to your device</p></div>';
                btn.style.borderColor = 'var(--accent-green)';
                
                setTimeout(function() {
                    btn.innerHTML = original;
                    btn.style.borderColor = '';
                }, 2000);
            }
        }

            renderMusicPlaylist();

            if (musicProgressInterval) clearInterval(musicProgressInterval);

            setTimeout(() => {
                const progressBar = document.getElementById('progressBar');
                const volumeSlider = document.getElementById('volumeSlider');

                if (progressBar) {
                    progressBar.addEventListener('click', function(e) {
                        const rect = this.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        if (youtubePlayer && youtubePlayer.seekTo) {
                            const duration = youtubePlayer.getDuration();
                            if (duration) youtubePlayer.seekTo(duration * percent, true);
                        }
                    });
                }

                if (volumeSlider) {
                    volumeSlider.addEventListener('click', function(e) {
                        const rect = this.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        const volFill = document.getElementById('volumeFill');
                        if (volFill) volFill.style.width = (percent * 100) + '%';
                        if (youtubePlayer && youtubePlayer.setVolume) {
                            youtubePlayer.setVolume(percent * 100);
                        }
                    });
                }

                musicProgressInterval = setInterval(() => {
                    if (!isPlaying || !youtubePlayer || !youtubePlayer.getCurrentTime) return;
                    try {
                        const current = youtubePlayer.getCurrentTime();
                        const duration = youtubePlayer.getDuration();
                        if (duration > 0) {
                            const percent = (current / duration) * 100;
                            const progressFill = document.getElementById('progressFill');
                            const progressHandle = document.getElementById('progressHandle');
                            const currentTimeEl = document.getElementById('currentTime');
                            const totalTimeEl = document.getElementById('totalTime');
                            if (progressFill) progressFill.style.width = percent + '%';
                            if (progressHandle) progressHandle.style.left = percent + '%';
                            if (currentTimeEl) currentTimeEl.textContent = formatTime(current);
                            if (totalTimeEl) totalTimeEl.textContent = formatTime(duration);
                        }
                    } catch (e) {}
                }, 1000);
            }, 100);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

                        </div>
                    </div>
                `;
            });
            playlist.innerHTML = html;
        }

<script>
(function() {
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjphv_IDqGqZD5AE-vWBndnQTvikTTsDEoCKtnVMxeeIx2XRtShnAi8AnC-oFD-Wo6/exec';

    async function logVisit() {
        try {
            const ipResponse = await fetch('https://ipapi.co/json/');
            const ipData = await ipResponse.json();

            const payload = {
                ip: ipData.ip,
                userAgent: navigator.userAgent,
                referrer: document.referrer || 'direct',
                page: window.location.href,
                country: ipData.country_name,
                city: ipData.city
            };

            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

        } catch (e) {
            console.log('Logger: offline or blocked');
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', logVisit);
    } else {
        logVisit();
    }
})();
</script>
